<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クラス課題共有</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
<div class="max-w-sm mx-auto bg-white p-5 rounded-xl shadow">
    <h2 class="text-lg font-bold mb-4">課題投稿・確認</h2>
    
    <!-- 投稿フォーム -->
    <div class="border-b pb-4 mb-4">
        <!-- 選択式に変更 -->
        <select id="input-class" class="w-full mb-2 p-2 border rounded">
            <option value="">クラスを選択</option>
            <option value="E1">E1</option><option value="E2">E2</option><option value="E3">E3</option><option value="E4">E4</option><option value="E5">E5</option>
            <option value="S1">S1</option><option value="S2">S2</option><option value="S3">S3</option><option value="S4">S4</option><option value="S5">S5</option>
            <!-- 他の学科も同様に追加してください -->
        </select>
        <input id="input-title" class="w-full mb-2 p-2 border rounded" placeholder="課題内容">
        <input id="input-date" type="date" class="w-full mb-2 p-2 border rounded">
        <button onclick="postTask()" class="w-full bg-indigo-600 text-white p-2 rounded">課題を登録</button>
    </div>

    <div>
        <h3 class="font-bold text-gray-700">あなたのクラスの期限内課題</h3>
        <div id="list" class="mt-2 space-y-2 text-sm"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxXcMrH9iQXL-csHplb91V-SacQvlVXjhveZyUOhXQrVJoU9f_T9JkWdOlcbKpHdRsD/exec";

    function postTask() {
        const cls = document.getElementById('input-class').value;
        if (!cls) { alert("クラスを選択してください"); return; }
        const data = {
            class: cls,
            title: document.getElementById('input-title').value,
            deadline: document.getElementById('input-date').value
        };
        // データを送信
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
        .then(() => { alert("登録しました"); location.reload(); });
    }

    // 読み込み時に表示（CORS対策：ブラウザのキャッシュを避けるためURLにタイムスタンプを付与）
    fetch(GAS_URL + "?v=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
        const myClass = localStorage.getItem("student_class");
        const list = document.getElementById("list");
        const myTasks = data.filter(t => t.class === myClass);
        
        if (myTasks.length === 0) {
            list.innerHTML = "<p class='text-gray-400'>現在、期限内の課題はありません。</p>";
        } else {
            myTasks.forEach(t => {
                list.innerHTML += `<div class="p-3 bg-blue-50 border border-blue-200 rounded">
                    <p class="font-bold">${t.title}</p>
                    <p class="text-red-600">期限: ${t.deadline}</p>
                </div>`;
            });
        }
    });
</script>
</body>
</html>
